plugins {
    id 'java'
    id 'maven-publish'
}

group = 'ru.mossoii84'
version = '0.0.2-SNAPSHOT'

repositories {
  mavenLocal()
  mavenCentral()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
                group = 'ru.mossoii84'
                version = '0.0.2-SNAPSHOT'
                artifactId = "logging-starter"

                from components.java
        }
    }

         repositories {
            maven {
                url = uri("${project.projectDir}/maven-repo")
            }
        }

}

